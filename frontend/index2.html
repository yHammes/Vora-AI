<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VORA Cadastro</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container">

<h1 style="font-family: &quot;Playfair Display&quot;, serif;">VORA</h1>
<p class="subtitle">Crie sua conta</p>


<form onsubmit="cadastrar(event)">
  <input id="username" placeholder="Usuário" required>
  <input id="senha1" type="password" placeholder="Senha" required>
  <input id="senha2" type="password" placeholder="Repita a senha" required>

  <button type="submit">Cadastrar</button>
</form>

<script src="api.js"></script>

<script>
async function cadastrar(event) {
  event.preventDefault();

  const user = username.value;
  const s1 = senha1.value;
  const s2 = senha2.value;

  if (s1 !== s2) {
    alert("Senhas diferentes!");
    return;
  }

  try {
    const data = await register(user, s1);

    if (data.status === 200) {
      alert("Usuário cadastrado com sucesso!");
      window.location.href = "index.html";
    } else {
      alert("Erro: " + data.detail);
    }

  } catch (error) {
    console.error(error);

    alert("Erro: " + (error.message || error));
  }
}
</script>
</body>
</html>
