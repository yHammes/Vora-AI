<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VORA Cadatro</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container">

<h1 style="font-family: &quot;Playfair Display&quot;, serif;">VORA</h1>
<p class="subtitle">Crie sua conta</p>

<form>

<label>Nome de Usuário</label>
<input type="Username" placeholder="Nome de Usuário">

<label>Senha</label>
<input id="Senha1"type="password" placeholder="••••••••">

<label>Repita a senha</label>
<input id="Senha2" type="password" placeholder="••••••••">

<button onclick="createAccount()">Sign In</button>

<p class="signup" style = "color:gray">
Já tem uma conta?
<a href="index.html">Login</a>
</p>

</form>

</div>

</body>

<script>
    function createAccount() {
    let senha1 = document.getElementById("Senha1").value;
    let senha2 = document.getElementById("Senha2").value;

    if (senha1 === senha2) {
        alert("Conta criada com sucesso!");
    } else {
        alert("As senhas não coincidem!");
    }
}
</script>
</html>
