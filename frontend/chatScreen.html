<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vora-AI</title>
    <script
      src="https://kit.fontawesome.com/4abcb7b86d.js"
      crossorigin="anonymous"
    ></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="src/assets/styles/chatScreenStyle.css" />
  </head>
  <body>
    <header>
      <div id="vora_name">
        <h1>VORA</h1>
      </div>
    
      <button onclick="window.location.href='index.html'">
        <i href="index.html" class="fa-solid fa-arrow-right-from-bracket"></i>
      </button>
    </header>

    <section>
      <!-- <div id="history_list"></div> -->

      <div id="chat_box">
        <div id="messages_display"></div>

        <div id="input_container">
          <textarea
            name="user_chat"
            id="chat"
            placeholder="Digite sua mensagem..."
            maxlength="1000"
          ></textarea>
          <button onclick="sendMessage()" id="send_btn">
            <i class="fa-solid fa-square-arrow-up-right"></i>
          </button>
        </div>
      </div>
    </section>

    <script>
      const msg = document.getElementById("chat");
      const display = document.getElementById("messages_display");

      function sendMessage() {
        message = msg.value;
        renderNewMessage("user", message);
        renderNewMessage("assistant", message);
      }

      function renderNewMessage(type, message) {
        const div = document.createElement("div");
        div.classList.add("message");
        div.classList.add(
          type === "user" ? "user-message" : "assistant-message",
        );
        div.textContent = message;
        display.appendChild(div);
        display.scrollTop = display.scrollHeight;
      }

      document.addEventListener("keydown", function (event) {
        const textArea = document.getElementById("chat");
        if (event.key === "Enter") {
          const activeElement = document.activeElement;
          if (activeElement.tagName === "TEXTAREA") {
            sendMessage();
            textArea.value = "";
          }
        }
      });

      function chatID() {
        const sessionId = crypto.randomUUID();
        console.log(sessionId);
      }

      document.addEventListener("DOMContentLoaded", chatID);
    </script>
  </body>
</html>
