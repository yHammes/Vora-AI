<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Vora-AI</title>
        <script
            src="https://kit.fontawesome.com/4abcb7b86d.js"
            crossorigin="anonymous"
        ></script>
        <link
            href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap"
            rel="stylesheet"
        />
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <script src="api.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
        <link rel="stylesheet" href="src/assets/styles/chatScreenStyle.css" />
    </head>
    <body>
        <header>
            <div id="vora_name">
                <h1>VORA</h1>
            </div>
            <button id="exit_btn" title="Sair">
                <i class="fa-solid fa-arrow-right-from-bracket"></i>
            </button>
        </header>

        <section>
            <!-- <div id="history_list"></div> -->

            <div id="chat_box">
                <div id="messages_display"></div>

                <div id="input_container">
                    <textarea
                        name="user_chat"
                        id="chat"
                        placeholder="Digite sua mensagem..."
                        maxlength="1000"
                    ></textarea>
                    <button
                        on
                        onclick="sendMessage()"
                        id="send_btn"
                        title="Enviar"
                    >
                        <i class="fa-solid fa-square-arrow-up-right"></i>
                    </button>
                </div>
            </div>
        </section>

        <script>
            const sessao_atual = chatID();
            const usr_msg = document.getElementById("chat");
            const display = document.getElementById("messages_display");

            async function sendMessage() {
                user_msg = usr_msg.value;
                renderNewMessage("user", user_msg);
                console.log(user_msg, 1, sessao_atual);
                const vora_msg = await send_message(user_msg, 1, sessao_atual);
                user_msg = "";
                renderNewMessage("assistant", vora_msg.data);
            }

            function renderNewMessage(type, message) {
                const div = document.createElement("div");
                div.classList.add("message");
                div.classList.add(
                    type === "user" ? "user-message" : "assistant-message",
                );
                div.innerHTML = marked.parse(message);
                display.appendChild(div);
                display.scrollTop = display.scrollHeight;
            }

            document.addEventListener("keydown", function (event) {
                const textArea = document.getElementById("chat");
                if (event.key === "Enter") {
                    const activeElement = document.activeElement;
                    if (activeElement.tagName === "TEXTAREA") {
                        sendMessage();
                        textArea.value = null;
                    }
                }
            });

            function chatID() {
                // const sessionId = crypto.randomUUID();
                sessionId = Math.floor(Math.random() * Number.MAX_SAFE_INTEGER);
                console.log(sessionId);

                return sessionId;
            }
        </script>
    </body>
</html>
